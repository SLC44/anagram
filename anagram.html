<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anagram Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #eee;
      overflow: hidden;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #a78bfa;
      margin-bottom: 2.5rem;
    }

    #card {
      background: #16213e;
      border: 2px solid #a78bfa33;
      border-radius: 1.5rem;
      padding: 3rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      box-shadow: 0 8px 40px #0008;
      position: relative;
    }

    #anagram {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #f0abfc;
      text-transform: uppercase;
      transition: transform 0.15s;
    }

    #anagram.shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-10px); }
      40%      { transform: translateX(10px); }
      60%      { transform: translateX(-8px); }
      80%      { transform: translateX(8px); }
    }

    #hint {
      font-size: 0.9rem;
      color: #94a3b8;
      letter-spacing: 0.05em;
    }

    #input-row {
      display: flex;
      gap: 0.75rem;
    }

    #guess {
      padding: 0.7rem 1.2rem;
      font-size: 1.2rem;
      border-radius: 0.75rem;
      border: 2px solid #a78bfa66;
      background: #0f172a;
      color: #eee;
      outline: none;
      width: 220px;
      text-align: center;
      letter-spacing: 0.1em;
      transition: border-color 0.2s;
    }

    #guess:focus { border-color: #a78bfa; }

    button {
      padding: 0.7rem 1.4rem;
      font-size: 1rem;
      border-radius: 0.75rem;
      border: none;
      background: #a78bfa;
      color: #1a1a2e;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover  { background: #c4b5fd; }
    button:active { transform: scale(0.96); }

    #score-row {
      display: flex;
      gap: 2rem;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    #score-row span { color: #f0abfc; font-weight: 700; }

    #message {
      font-size: 1.1rem;
      min-height: 1.5rem;
      color: #4ade80;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      pointer-events: none;
      animation: confetti-fall linear forwards;
    }

    @keyframes confetti-fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* Success pulse on card */
    #card.success {
      animation: pulse-border 0.6s ease;
    }

    @keyframes pulse-border {
      0%,100% { border-color: #a78bfa33; box-shadow: 0 8px 40px #0008; }
      50%      { border-color: #4ade80; box-shadow: 0 0 60px #4ade8055; }
    }
  </style>
</head>
<body>

<h1>Anagram!</h1>

<div id="card">
  <div id="anagram"></div>
  <div id="hint"></div>
  <div id="input-row">
    <input id="guess" type="text" placeholder="Your answer…" autocomplete="off" spellcheck="false">
    <button onclick="checkGuess()">Guess</button>
  </div>
  <div id="message"></div>
  <div id="score-row">
    Score: <span id="score">0</span> &nbsp;|&nbsp; Streak: <span id="streak">0</span>
  </div>
</div>

    'forge','forth','found','frank','fraud','fresh','front','fruit','fully','fuzzy',

    'noted','novel','nurse','nymph','occur','offer','often','onset','opera','order',
    'other','otter','ought','outdo','outer','oxide','ozone','panda','panic','paper',

    'pinch','pilot','pixel','pizza','place','plain','plane','plant','plate','plaza',
    'plead','pluck','plume','plunge','point','polar','poppy','porch','pound','power',

    'prove','prowl','proxy','pulse','punch','pupil','quake','quest','queue','quick',

    'reach','ready','realm','rebel','refer','reign','relax','repay','reply','rerun',
    'reset','reuse','rigid','risky','rival','river','robot','rocky','rouge','rough',
    'round','route','royal','ruler','rural','rusty','sadly','saint','salad','sauce',
    'scale','scene','scope','score','scout','seize','sense','serve','setup','seven',
    'shade','shake','shall','shame','shape','share','sharp','shawl','shift','shirt',
    'shock','shoot','shore','short','shout','sight','sigma','silly','since','sixth',
    'sixty','sized','skill','skimp','skirt','skull','slack','slash','slate','slick',

    'spell','spend','spice','spine','sport','spray','squad','staff','stage','stain',

    'story','stove','straw','strip','stuck','study','stuff','style','sugar','suite',
    'super','surge','swamp','swarm','swear','sweet','swept','swift','swing','sword',
    'table','taste','teach','tense','tenth','terms','there','thing','think','third',
    'thorn','those','three','threw','throw','thumb','tidal','tidal','timed','tired',
    'title','today','token','total','touch','tough','tower','toxic','track','trade',
    'trail','train','trait','trash','tread','trend','trial','tribe','trick','tried',
    'troop','truck','truly','trump','trunk','trust','truth','tuned','twist','tying',
    'typed','under','unity','until','upper','upset','urban','usage','valid','value',
    'valve','vapor','vault','verse','viola','viral','virus','vista','vital','vivid',
    'voice','vouch','vowel','wagon','watch','water','weary','weave','wedge','weird',
    'wheat','wheel','where','which','while','whole','whose','wider','world','worry',
    'worst','worth','would','wound','woven','yacht','yield','young','youth','zippy'
  ];

  // Deduplicate
  const wordList = [...new Set(WORDS)].filter(w => w.length >= 4);

  let currentWord = '';
  let score = 0;
  let streak = 0;
  let attempts = 0;
  const MAX_ATTEMPTS = 3;

  function shuffle(str) {
    const arr = str.split('');
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr.join('');
  }

  function jumble(word) {
    let result = shuffle(word);
    let tries = 0;
    while (result === word && tries < 20) {
      result = shuffle(word);
      tries++;
    }
    return result;
  }

  function newRound() {
    currentWord = wordList[Math.floor(Math.random() * wordList.length)];
    attempts = 0;
    const jumbled = jumble(currentWord);
    document.getElementById('anagram').textContent = jumbled;
    document.getElementById('hint').textContent = `${currentWord.length} letters`;
    document.getElementById('guess').value = '';
    document.getElementById('guess').disabled = false;
    document.querySelector('button').disabled = false;
    document.getElementById('message').textContent = '';
    document.getElementById('guess').focus();
  }

  function setMessage(text, color) {
    const el = document.getElementById('message');
    el.style.color = color;
    el.textContent = text;
  }

  function updateScoreboard() {
    document.getElementById('score').textContent = score;
    document.getElementById('streak').textContent = streak;
  }

  function checkGuess() {
    const guess = document.getElementById('guess').value.trim().toLowerCase();
    if (!guess) return;

    if (guess === currentWord) {
      score++;
      streak++;
      updateScoreboard();
      setMessage('Correct!', '#4ade80');
      launchConfetti();
      pulseCard();
      setTimeout(newRound, 1400);
    } else {
      attempts++;
      streak = 0;
      updateScoreboard();
      shakeAnagram();
      document.getElementById('guess').value = '';

      if (attempts >= MAX_ATTEMPTS) {
        setMessage(`The word was "${currentWord}" — next up!`, '#fb923c');
        document.getElementById('guess').disabled = true;
        document.querySelector('button').disabled = true;
        setTimeout(newRound, 2200);
      } else {
        const left = MAX_ATTEMPTS - attempts;
        setMessage(`Not quite — ${left} attempt${left === 1 ? '' : 's'} left!`, '#f87171');
        document.getElementById('guess').focus();
      }
    }
  }

  function shakeAnagram() {
    const el = document.getElementById('anagram');
    el.classList.remove('shake');
    void el.offsetWidth; // reflow
    el.classList.add('shake');
  }

  function pulseCard() {
    const el = document.getElementById('card');
    el.classList.remove('success');
    void el.offsetWidth;
    el.classList.add('success');
  }

  function launchConfetti() {
    const colors = ['#a78bfa','#f0abfc','#4ade80','#facc15','#38bdf8','#fb923c'];
    for (let i = 0; i < 80; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.top = '-20px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.width  = (6 + Math.random() * 8) + 'px';
      piece.style.height = (6 + Math.random() * 8) + 'px';
      piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      const duration = 1.2 + Math.random() * 1.2;
      piece.style.animationDuration = duration + 's';
      piece.style.animationDelay = Math.random() * 0.4 + 's';
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), (duration + 0.5) * 1000);
    }
  }

  document.getElementById('guess').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkGuess();
  });

  newRound();
</script>

</body>
</html>
