<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANAGRAM — AG-01</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #090909;
      --surface:     #111111;
      --panel:       #0C0C0C;
      --orange:      #FF5C00;
      --orange-glow: #FF5C0020;
      --white:       #E6E6E6;
      --muted:       #3D3D3D;
      --border:      #1E1E1E;
      --red:         #CC2200;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      background-image: radial-gradient(circle, #181818 1px, transparent 1px);
      background-size: 22px 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      color: var(--white);
    }

    /* ── Device shell ── */
    #device {
      width: 520px;
      max-width: calc(100vw - 2rem);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2.5rem 2.5rem 2rem;
      position: relative;
    }

    /* Corner registration marks */
    .corner {
      position: absolute;
      width: 16px;
      height: 16px;
    }
    .corner.tl { top: -1px;    left: -1px;   border-top: 2px solid var(--orange); border-left:  2px solid var(--orange); }
    .corner.tr { top: -1px;    right: -1px;  border-top: 2px solid var(--orange); border-right: 2px solid var(--orange); }
    .corner.bl { bottom: -1px; left: -1px;   border-bottom: 2px solid var(--orange); border-left:  2px solid var(--orange); }
    .corner.br { bottom: -1px; right: -1px;  border-bottom: 2px solid var(--orange); border-right: 2px solid var(--orange); }

    /* ── Header ── */
    .hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .brand-name {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--orange);
    }

    .brand-sub {
      margin-top: 3px;
      font-size: 0.48rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Blinking activity LED */
    .led {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 8px var(--orange);
      animation: blink 2.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── Field label ── */
    .lbl {
      font-size: 0.48rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    /* ── Tile display ── */
    #display {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 1.4rem 1.2rem 1rem;
      margin-bottom: 1.5rem;
    }

    #tiles {
      display: flex;
      gap: 5px;
      justify-content: center;
      flex-wrap: wrap;
      min-height: 56px;
      align-items: center;
    }

    .tile {
      width: 44px;
      height: 50px;
      background: #141414;
      border: 1px solid #262626;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--orange);
      text-transform: uppercase;
      position: relative;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .tile::after {
      content: attr(data-n);
      position: absolute;
      bottom: 3px;
      right: 4px;
      font-size: 0.37rem;
      color: #2C2C2C;
      font-weight: 400;
    }

    .tile.shaking {
      animation: t-shake 0.38s ease;
    }
    @keyframes t-shake {
      0%,100% { transform: translateY(0) rotate(0deg); }
      20%      { transform: translateY(-6px) rotate(-4deg); }
      60%      { transform: translateY(5px)  rotate(4deg); }
    }

    .tile.lit {
      background: var(--orange);
      color: #000;
      border-color: var(--orange);
    }

    /* Display footer: length + pips */
    .disp-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.9rem;
      padding-top: 0.7rem;
      border-top: 1px solid #161616;
    }

    #length-lbl {
      font-size: 0.48rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .pips-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .pips-lbl {
      font-size: 0.48rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .pips {
      display: flex;
      gap: 4px;
    }

    .pip {
      width: 8px;
      height: 8px;
      border: 1px solid #2E2E2E;
      background: transparent;
      transition: background 0.2s, border-color 0.2s;
    }

    .pip.used { background: var(--red); border-color: var(--red); }

    /* ── Input ── */
    #input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 0.9rem;
    }

    #guess {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--white);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      padding: 0.75rem 1rem;
      outline: none;
      text-transform: uppercase;
      caret-color: var(--orange);
      transition: border-color 0.15s;
    }
    #guess::placeholder { color: #252525; letter-spacing: 0.1em; }
    #guess:focus         { border-color: var(--orange); }
    #guess:disabled      { opacity: 0.25; }

    #enter-btn {
      background: var(--orange);
      color: #000;
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0 1.4rem;
      cursor: pointer;
      transition: background 0.1s;
      white-space: nowrap;
    }
    #enter-btn:hover    { background: #FF7733; }
    #enter-btn:active   { background: #CC4A00; }
    #enter-btn:disabled { background: #222; color: #3A3A3A; cursor: default; }

    /* ── Message bar ── */
    #msg-bar {
      height: 1rem;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 1.75rem;
    }

    .msg-caret { font-size: 0.52rem; color: var(--muted); }

    #msg-text {
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* ── Stats ── */
    .stats {
      display: flex;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .stat { flex: 1; }

    .stat + .stat {
      border-left: 1px solid var(--border);
      padding-left: 2rem;
    }

    .stat-val {
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1;
      color: var(--white);
      margin-top: 0.4rem;
      font-variant-numeric: tabular-nums;
    }

    /* ── Device footer ── */
    .dev-foot {
      display: flex;
      justify-content: space-between;
      margin-top: 1.75rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .foot-txt {
      font-size: 0.42rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #242424;
    }

    /* ── Timer bar ── */
    #timer-track {
      height: 3px;
      background: #141414;
      margin-top: 1rem;
      overflow: hidden;
    }

    #timer-bar {
      height: 100%;
      width: 100%;
      background: var(--orange);
      box-shadow: 0 0 6px var(--orange);
    }

    /* ── Game over overlay ── */
    #game-over {
      display: none;
      position: absolute;
      inset: 0;
      background: var(--surface);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 2.5rem;
    }

    #game-over.active { display: flex; }

    .go-header {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 2.5rem;
    }

    .go-lbl {
      font-size: 0.48rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .go-score {
      font-size: 5rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1;
      margin-bottom: 2.5rem;
      font-variant-numeric: tabular-nums;
    }

    #restart-btn {
      background: transparent;
      color: var(--orange);
      border: 1px solid var(--orange);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0.75rem 2rem;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }

    #restart-btn:hover  { background: var(--orange); color: #000; }
    #restart-btn:active { background: #CC4A00; border-color: #CC4A00; color: #000; }

    /* ── Start screen (full-viewport) ── */
    #start-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      background-image: radial-gradient(circle, #181818 1px, transparent 1px);
      background-size: 22px 22px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #start-screen.active { display: flex; }

    .ss-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 0.6rem;
    }

    .ss-sub {
      font-size: 0.46rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.8rem;
    }

    #start-btn {
      background: var(--orange);
      color: #000;
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 1rem 2.8rem;
      cursor: pointer;
      transition: background 0.12s;
    }

    #start-btn:hover  { background: #FF7733; }
    #start-btn:active { background: #CC4A00; }

    /* ── Success glow ── */
    #device.success {
      animation: dev-glow 0.7s ease;
    }
    @keyframes dev-glow {
      0%,100% { box-shadow: none; }
      40%      { box-shadow: 0 0 0 1px var(--orange), 0 0 50px var(--orange-glow); }
    }

    /* ── Confetti ── */
    .cp {
      position: fixed;
      pointer-events: none;
      animation: cp-fall linear forwards;
    }
    @keyframes cp-fall {
      0%   { opacity: 1;   transform: translateY(-10px) rotate(0deg); }
      70%  { opacity: 0.8; }
      100% { opacity: 0;   transform: translateY(110vh) rotate(600deg); }
    }
  </style>
</head>
<body>

<div id="start-screen" class="active">
  <div class="ss-title">Anagram</div>
  <div class="ss-sub">Model AG&#x2013;01 &nbsp;&bull;&nbsp; 10 sec &nbsp;&bull;&nbsp; 3 lives</div>
  <button id="start-btn" onclick="startGame()">Start Game</button>
</div>

<div id="device">
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>

  <div class="hdr">
    <div>
      <div class="brand-name">Anagram</div>
      <div class="brand-sub">Model AG&#x2013;01 &nbsp;/&nbsp; Rev.3</div>
    </div>
    <div class="led"></div>
  </div>

  <div class="lbl">Scrambled Word</div>
  <div id="display">
    <div id="tiles"></div>
    <div class="disp-foot">
      <span id="length-lbl">&#x2014; letters</span>
      <div class="pips-wrap">
        <span class="pips-lbl">Lives</span>
        <div class="pips" id="pips">
          <div class="pip"></div>
          <div class="pip"></div>
          <div class="pip"></div>
        </div>
      </div>
    </div>
    <div id="timer-track"><div id="timer-bar"></div></div>
  </div>

  <div class="lbl">Input</div>
  <div id="input-row">
    <input id="guess" type="text" placeholder="Type your answer" autocomplete="off" spellcheck="false">
    <button id="enter-btn" onclick="checkGuess()">Enter</button>
  </div>

  <div id="msg-bar">
    <span class="msg-caret">&gt;</span>
    <span id="msg-text"></span>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="lbl">Score</div>
      <div class="stat-val" id="score">00</div>
    </div>
    <div class="stat">
      <div class="lbl">Streak</div>
      <div class="stat-val" id="streak">00</div>
    </div>
  </div>

  <div class="dev-foot">
    <span class="foot-txt">Word Game Unit &mdash; S/N 4096</span>
    <span class="foot-txt">&copy; 2026</span>
  </div>

  <div id="game-over">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>
    <div class="go-header">&#x2014; Game Over &#x2014;</div>
    <div class="go-lbl">Final Score</div>
    <div class="go-score" id="go-score">00</div>
    <button id="restart-btn" onclick="restartGame()">Play Again</button>
  </div>
</div>

    'stood','store','storm','story','stove','straw','strip','stuck','study','stuff',
    'style','sugar','suite','super','surge','swamp','swarm','swear','sweet','swept',
    'swift','swing','sword','taste','teach','tense','tenth','terms','thing','think',
    'third','thorn','those','three','threw','throw','thumb','timed','tired','title',
    'today','token','total','touch','tough','tower','toxic','track','trade','trail',
    'train','trait','trash','tread','trend','trial','tribe','trick','tried','troop',
    'truck','truly','trunk','trust','truth','tuned','twist','tying','typed','under',
    'unity','until','upper','upset','urban','usage','valid','value','valve','vapor',
    'vault','verse','viola','viral','virus','vista','vital','vivid','voice','vouch',
    'vowel','wagon','watch','water','weary','weave','wedge','weird','wheat','wheel',
    'whole','wider','world','worry','worst','worth','would','wound','woven','yacht',
    'yield','young','youth','zippy'
  ];

  const wordList = [...new Set(WORDS)].filter(w => w.length >= 4);
  const wordSet  = new Set(wordList);

  function isAnagram(a, b) {
    return a.length === b.length && [...a].sort().join('') === [...b].sort().join('');
  }

  let currentWord = '';
  let score = 0;
  let streak = 0;
  let lives = MAX_LIVES;
  let timerTimeout = null;

  const pad = n => String(n).padStart(2, '0');

  function shuffle(str) {
    const a = str.split('');
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a.join('');
  }

  function jumble(word) {
    let r = shuffle(word);
    let t = 0;
    while (r === word && t++ < 20) r = shuffle(word);
    return r;
  }

  function renderTiles(word) {
    const c = document.getElementById('tiles');
    c.innerHTML = '';
    word.split('').forEach((ch, i) => {
      const t = document.createElement('div');
      t.className = 'tile';
      t.textContent = ch;
      t.dataset.n = pad(i + 1);
      c.appendChild(t);
    });
  }

  function updateLives() {
    document.querySelectorAll('.pip').forEach((p, i) =>
      p.classList.toggle('used', i < (MAX_LIVES - lives)));
  }

  function startTimer() {
    clearTimeout(timerTimeout);
    const bar = document.getElementById('timer-bar');
    bar.style.transition = 'none';
    bar.style.width = '100%';
    void bar.offsetWidth;
    bar.style.transition = `width ${TIMER_SECONDS}s linear`;
    bar.style.width = '0%';
    timerTimeout = setTimeout(timeUp, TIMER_SECONDS * 1000);
  }

  function stopTimer() {
    clearTimeout(timerTimeout);
    timerTimeout = null;
    const bar = document.getElementById('timer-bar');
    bar.style.transition = 'none';
  }

  function timeUp() {
    timerTimeout = null;
    lives--;
    streak = 0;
    updateLives();
    updateBoard();
    renderTiles(currentWord);
    setMsg(`Time’s up — ${currentWord.toUpperCase()}`, '#CC2200');
    document.getElementById('guess').disabled = true;
    document.getElementById('enter-btn').disabled = true;
    if (lives <= 0) {
      setTimeout(gameOver, 1800);
    } else {
      setTimeout(newRound, 1800);
    }
  }

  function setMsg(text, color) {
    const el = document.getElementById('msg-text');
    el.style.color = color;
    el.textContent = text;
  }

  function updateBoard() {
    document.getElementById('score').textContent  = pad(score);
    document.getElementById('streak').textContent = pad(streak);
  }

  function newRound() {
    currentWord = wordList[Math.floor(Math.random() * wordList.length)];
    renderTiles(jumble(currentWord));
    document.getElementById('length-lbl').textContent = `${currentWord.length} letters`;
    document.getElementById('guess').value = '';
    document.getElementById('guess').disabled = false;
    document.getElementById('enter-btn').disabled = false;
    setMsg('', '');
    startTimer();
    document.getElementById('guess').focus();
  }

  function shakeTiles() {
    document.querySelectorAll('.tile').forEach((t, i) => {
      t.classList.remove('shaking');
      void t.offsetWidth;
      t.style.animationDelay = (i * 28) + 'ms';
      t.classList.add('shaking');
    });
  }

  function winTiles() {
    document.querySelectorAll('.tile').forEach((t, i) => {
      setTimeout(() => t.classList.add('lit'), i * 55);
    });
    const dev = document.getElementById('device');
    dev.classList.remove('success');
    void dev.offsetWidth;
    dev.classList.add('success');
  }

  function confetti() {
    const colors = ['#FF5C00','#FF8040','#FFFFFF','#E0E0E0','#CC4A00','#FFB380'];
    for (let i = 0; i < 65; i++) {
      const p = document.createElement('div');
      p.className = 'cp';
      const rect = Math.random() > 0.45;
      p.style.cssText = `
        left: ${Math.random() * 100}vw;
        top: -12px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        width: ${rect ? 3 : 7}px;
        height: ${rect ? 14 : 7}px;
        animation-duration: ${1.1 + Math.random() * 1.1}s;
        animation-delay: ${Math.random() * 0.45}s;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2400);
    }
  }

  function checkGuess() {
    const input = document.getElementById('guess');
    const guess = input.value.trim().toLowerCase();
    if (!guess) return;

    if (guess === currentWord || (wordSet.has(guess) && isAnagram(guess, currentWord))) {
      stopTimer();
      score++; streak++;
      updateBoard();
      setMsg('Correct', '#FF5C00');
      winTiles();
      confetti();
      input.disabled = true;
      document.getElementById('enter-btn').disabled = true;
      setTimeout(newRound, 1700);
    } else {
      shakeTiles();
      input.value = '';
      setMsg('Wrong — try again', '#CC2200');
      input.focus();
    }
  }

  function gameOver() {
    stopTimer();
    document.getElementById('go-score').textContent = pad(score);
    document.getElementById('game-over').classList.add('active');
  }

  function startGame() {
    document.getElementById('start-screen').classList.remove('active');
    newRound();
  }

  function restartGame() {
    score = 0; streak = 0; lives = MAX_LIVES;
    updateBoard();
    updateLives();
    document.getElementById('game-over').classList.remove('active');
    newRound();
  }

  document.getElementById('guess').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkGuess();
  });
</script>

</body>
</html>
